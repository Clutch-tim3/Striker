name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller psutil faiss-cpu scikit-learn numpy requests watchdog

      - name: Bundle Python backend
        run: bash scripts/build-python.sh

      - name: Install Node deps
        run: npm ci
        working-directory: mahoraga

      - name: Build macOS DMG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run dist -- --mac
        working-directory: mahoraga

      - name: Upload to Firebase Storage
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: mahoraga/dist
          destination: clive-6d22e.appspot.com/apps/mahoraga/${{ github.ref_name }}
          glob: '*.dmg'
          credentials: ${{ secrets.FIREBASE_SA_KEY }}

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller psutil faiss-cpu scikit-learn numpy requests watchdog

      - name: Bundle Python backend
        run: bash scripts/build-python.sh

      - name: Install Node deps
        run: npm ci
        working-directory: mahoraga

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist -- --win
        working-directory: mahoraga

      - name: Upload to Firebase Storage
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: mahoraga/dist
          destination: clive-6d22e.appspot.com/apps/mahoraga/${{ github.ref_name }}
          glob: '*.exe'
          credentials: ${{ secrets.FIREBASE_SA_KEY }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install pyinstaller psutil faiss-cpu scikit-learn numpy requests watchdog

      - name: Bundle Python backend
        run: bash scripts/build-python.sh

      - name: Install Node deps
        run: npm ci
        working-directory: mahoraga

      - name: Build Linux AppImage
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npm run dist -- --linux
        working-directory: mahoraga

      - name: Upload to Firebase Storage
        uses: google-github-actions/upload-cloud-storage@v2
        with:
          path: mahoraga/dist
          destination: clive-6d22e.appspot.com/apps/mahoraga/${{ github.ref_name }}
          glob: '*.AppImage'
          credentials: ${{ secrets.FIREBASE_SA_KEY }}

  deploy-listing:
    runs-on: ubuntu-latest
    needs: [build-mac, build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Update version in listing page
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/const VER  = '[^']*'/const VER  = '${VERSION}'/" mahoraga/deploy/public/apps/mahoraga/index.html
          sed -i "s/<span class=\"val\">1\.0\.0<\/span>/<span class=\"val\">${VERSION}<\/span>/" mahoraga/deploy/public/apps/mahoraga/index.html

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SA_KEY }}
          projectId: clive-6d22e
          entryPoint: mahoraga/deploy
